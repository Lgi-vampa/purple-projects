  <body>
    <script>
      const arr = [3, 6, 9, 2];

      function check(num) {
        if (num > 5) {
          return true;
        } else {
          return false;
        }
      }

      function filterArray(arr, func) {
        for (let i = arr.length - 1; i >= 0; i--) {
          if (func(arr[i])) {
            arr.splice(i, 1);
          }
        }
        return arr;
      }

      console.log(filterArrey(arr, check));
    </script>
