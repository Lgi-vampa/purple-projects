  <body>
    <script>
      let card = "4561-2612-1234-5464";

      function currCard(str) {
        str = str.replaceAll("-", "")
        let number = str.split("");

        for (let i = 0; i < number.length; i++) {
        //   if (isNaN(element)) {
        //     return false;
        //   }

          if (i % 2 != 0) {
            number[i] *= 2;

            if (number[i] > 9) {
              number[i] -= 9;
            }
          }
        }
        number = number.reduce((acc, num) => acc + num, 0);

        if (number % 10 === 0) {
          return true;
        } else {
          return false;
        }
      }
    </script>
